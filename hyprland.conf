# ────────────────────────────────────────────────────────────
# Omarchy Theme for Hyprland
# ────────────────────────────────────────────────────────────

general {
    col.active_border = rgb(574750)
    col.inactive_border = rgb(1a1b26)
    border_size = 2
    gaps_in = 2
    gaps_out = 4
}


animations {
    enabled = true

    # ── Bezier Curves ─────────────────────────────────────────────────────────
    # Tuned for 75 Hz (≈13.3 ms/frame) — slightly tighter than 60 Hz defaults
    # so motion completes in the same wall-clock time

    bezier = macosSpring,   0.22, 1.0,  0.36, 1.0   # natural spring, subtle overshoot
    bezier = macosEase,     0.4,  0.0,  0.2,  1.0   # smooth ease-in-out
    bezier = macosOut,      0.0,  0.0,  0.2,  1.0   # fast settle for exits
    bezier = macosFade,     0.25, 0.0,  0.75, 1.0   # clean linear-ish fade

    # ── Windows ───────────────────────────────────────────────────────────────
    # Speed values scaled up ~1.25× vs 60 Hz originals to keep durations equal
    # Formula: speed_75 = speed_60 × (75 / 60)

    animation = windows,        1, 6, macosSpring, popin 88%
    animation = windowsIn,      1, 6, macosSpring, popin 88%
    animation = windowsOut,     1, 5, macosOut,    popin 80%
    animation = windowsMove,    1, 6, macosSpring

    # ── Borders ───────────────────────────────────────────────────────────────
    animation = border,         1, 6, macosEase
    animation = borderangle,    1, 6, macosEase

    # ── Fades ─────────────────────────────────────────────────────────────────
    # Quick and clean — macOS never lingers on fades
    animation = fade,           1, 4, macosFade
    animation = fadeIn,         1, 5, macosSpring
    animation = fadeOut,        1, 4, macosOut
    animation = fadeDim,        1, 5, macosEase
    animation = fadeShadow,     1, 5, macosEase
    animation = fadeLayers,     1, 4, macosFade

    # ── Workspaces ────────────────────────────────────────────────────────────
    # Physical, fast swipe — identical feel to macOS Mission Control swipe
    animation = workspaces,         1, 6, macosSpring,  slide
    animation = specialWorkspace,   1, 4, macosEase, slidefadevert 20%
    animation = layers,             1, 4, macosEase,    slide
}

decoration {
    rounding = 10
    shadow {
      enabled = true
      range = 15
      render_power = 5
      offset = 0 0
    } 
    
    blur {
      enabled = true
      size = 3
      passes = 3
      contrast = 1.1
      brightness = 1.1
      vibrancy = 0.2
      vibrancy_darkness = 0.2
      noise = 0.06
      ignore_opacity = true
      new_optimizations = on
      popups_ignorealpha = 0.2
      input_methods_ignorealpha = 0.1
    }
    active_opacity = 0.93
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0 
}

layerrule {
  name = blur_walker
  match:namespace = walker
  blur = true
}

layerrule {
  name = blur_waybar
  match:namespace = waybar
  blur = true
}

layerrule {
  name = blur_mako
  match:namespace = mako
  blur = true
}

layerrule {
  name = blur_vicinae
  match:namespace = vicinae
  blur = true
}

layerrule {
  name = blur_swayosd
  match:namespace = swayosd
  blur = true
}

debug {
    damage_tracking = false
}

# Workspace Switch
bind = SUPER,1,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,2,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,3,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,4,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,5,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,6,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,7,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,8,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,9,exec,~/.config/omarchy/themes/atari/retrolines.sh
bind = SUPER,0,exec,~/.config/omarchy/themes/atari/retrolines.sh
